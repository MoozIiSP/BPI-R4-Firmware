
# Increase Conntrack Table Size (for 10G + Tailscale/Zerotier)
net.netfilter.nf_conntrack_max = 262144
net.netfilter.nf_conntrack_tcp_timeout_established = 86400
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 60

# TCP BBR & Window Tuning
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.ipv4.tcp_rmem = 4096 87380 134217728
net.ipv4.tcp_wmem = 4096 65536 134217728
net.ipv4.tcp_slow_start_after_idle = 0

# NAPI Budget Tuning for 10G
# Increase packets processed per interrupt cycle (Default 300)
net.core.netdev_budget=600
net.core.netdev_budget_usecs=4000

# Reduce latency for high-priority traffic
net.core.busy_poll=50
net.core.busy_read=50

### 4GB RAM VM Tuning ###
# Prefer physical RAM over swap
vm.swappiness=10
vm.dirty_background_ratio=5
vm.dirty_ratio=10

# Keep inode/dentry cache in memory for better routing performance
vm.vfs_cache_pressure=50

# Allow memory overcommit for heavy apps (Docker/Cloudflared)
vm.overcommit_memory=1

# Min free kbytes (tune based on 4GB, approx 1% = 40MB)
vm.min_free_kbytes=65536

### System Responsiveness (Latency) ###
# Use FQ_CODEL for default qdisc (prevents bufferbloat)
net.core.default_qdisc=fq_codel

# CPU Scheduler latency (in microseconds)
kernel.sched_latency_ns=10000000
kernel.sched_migration_cost_ns=5000000
