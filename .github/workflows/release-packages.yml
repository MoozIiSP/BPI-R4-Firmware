name: Release Packages
run-name: Release Packages · ${{ github.event.inputs.tag_name || github.ref_name }}

on:
  push:
    tags:
      - "packages-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Package release tag to create or update"
        required: true
        type: string
      draft:
        description: "Create release as draft"
        required: true
        type: boolean
        default: true
      mtk_feed_release:
        description: "MediaTek feed release directory"
        required: true
        type: string
        default: "24.10"

permissions:
  contents: write

concurrency:
  group: release-packages-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-packages:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      BUILD_VARIANT: full
      BUILD_MEDIA: sd
      BPI_R4_ENABLE_MTK_FEED: "1"
      BPI_R4_MTK_FEED_RELEASE: ${{ inputs.mtk_feed_release || '24.10' }}
      BUNDLE_FIRMWARE: "0"
      BUNDLE_PACKAGE_REPOSITORY: "1"
      ARTIFACT_DIR: artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('build/*.sh', 'seed/*.seed') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: Install dependencies
        run: bash build/ci-install-deps.sh

      - name: Build full package repository
        run: bash build/ci-build.sh

      - name: Upload package repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpi-r4-full-packages
          path: |
            artifacts/bpi-r4-full-packages.zip
            artifacts/bpi-r4-full-packages.zip.sha256sum
          retention-days: 14

  publish:
    needs: build-packages
    runs-on: ubuntu-24.04
    steps:
      - name: Download package bundle
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag_name }}"
            draft="${{ inputs.draft }}"
          else
            tag="${GITHUB_REF_NAME}"
            draft="false"
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'draft=%s\n' "$draft" >> "$GITHUB_OUTPUT"

      - name: Create or update package release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_DRAFT: ${{ steps.meta.outputs.draft }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          BPI-R4 full package repository release built by GitHub Actions.

          Build profile:
          - Variant: full
          - Media path: SD
          - MTK feed: enabled
          - Custom bootloader: enabled through the standard build preparation path

          Contents:
          - bin/packages
          - bin/targets/mediatek/filogic/packages
          - build config snapshot

          The bundle preserves generated package indexes and all produced .apk/.ipk files.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
          else
            draft_flag=""
            if [ "$RELEASE_DRAFT" = "true" ]; then
              draft_flag="--draft"
            fi
            gh release create "$RELEASE_TAG" release-artifacts/* \
              --title "$RELEASE_TAG" \
              --notes-file "$notes_file" \
              $draft_flag
          fi
