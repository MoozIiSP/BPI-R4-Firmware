name: Release Firmware
run-name: Release Firmware · ${{ github.event.inputs.tag_name || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update"
        required: true
        type: string
      draft:
        description: "Create release as draft"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        media: [sd, emmc, snand]
    env:
      BUILD_VARIANT: minimal
      BUILD_MEDIA: ${{ matrix.media }}
      BPI_R4_ENABLE_MTK_FEED: "1"
      BPI_R4_MTK_FEED_RELEASE: "24.10"
      ARTIFACT_DIR: artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('build/*.sh', 'seed/*.seed') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: Install dependencies
        run: bash build/ci-install-deps.sh

      - name: Build firmware
        run: bash build/ci-build.sh

      - name: Upload release candidate bundle
        uses: actions/upload-artifact@v4
        with:
          name: bpi-r4-minimal-${{ matrix.media }}
          path: |
            artifacts/*.zip
            artifacts/*.sha256sum
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag_name }}"
            draft="${{ inputs.draft }}"
          else
            tag="${GITHUB_REF_NAME}"
            draft="false"
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'draft=%s\n' "$draft" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_DRAFT: ${{ steps.meta.outputs.draft }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          BPI-R4 minimal firmware release built by GitHub Actions.

          Included bundles:
          - SD
          - eMMC
          - SPI-NAND

          Validation expectation:
          - Build artifacts are generated by the normalized CI pipeline.
          - Hardware validation should be recorded separately using docs/templates/validation-checklist.md.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
          else
            draft_flag=""
            if [ "$RELEASE_DRAFT" = "true" ]; then
              draft_flag="--draft"
            fi
            gh release create "$RELEASE_TAG" release-artifacts/* \
              --title "$RELEASE_TAG" \
              --notes-file "$notes_file" \
              $draft_flag
          fi
